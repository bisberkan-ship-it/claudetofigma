<!DOCTYPE html>
<html>
<head>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #2c2c2c;
      color: #e0e0e0;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    .dot.ready { background: #48aa5c; box-shadow: 0 0 6px #48aa5c88; }
    .dot.notready { background: #e93a40; box-shadow: 0 0 6px #e93a4088; }
    .status-text { font-size: 12px; font-weight: 500; }
    .status-text.ready { color: #95d5b2; }
    .status-text.notready { color: #f4a4a4; }
  </style>
</head>
<body>
  <div class="content">
    <div class="status-row">
      <div class="dot notready" id="dot"></div>
      <span class="status-text notready" id="statusText">Plugin not ready</span>
    </div>
  </div>

  <script>
    let ws = null;
    let isConnected = false;

    const dot = document.getElementById('dot');
    const statusText = document.getElementById('statusText');

    function setReady(ready) {
      isConnected = ready;
      if (ready) {
        dot.className = 'dot ready';
        statusText.className = 'status-text ready';
        statusText.textContent = 'Plugin ready';
      } else {
        dot.className = 'dot notready';
        statusText.className = 'status-text notready';
        statusText.textContent = 'Plugin not ready';
      }
    }

    const WS_URLS = ['ws://127.0.0.1:9000', 'ws://localhost:9000'];
    let wsUrlIndex = 0;

    function connect() {
      if (ws) ws.close();
      const url = WS_URLS[wsUrlIndex % WS_URLS.length];
      ws = new WebSocket(url);

      ws.onopen = () => {
        wsUrlIndex = 0;
        setReady(true);
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          parent.postMessage({ pluginMessage: { type: 'ws_message', data: msg } }, '*');
        } catch (e) {}
      };

      ws.onclose = () => {
        setReady(false);
      };

      ws.onerror = () => {
        wsUrlIndex++;
        if (wsUrlIndex < WS_URLS.length) {
          setTimeout(connect, 500);
        } else {
          wsUrlIndex = 0;
          setTimeout(connect, 3000);
        }
      };
    }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'ws_response') {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(msg.data));
        }
      }
    };

    setTimeout(connect, 500);
  </script>
</body>
</html>
